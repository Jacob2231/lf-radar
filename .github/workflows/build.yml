name: Build LF Radar (Momentum stable)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Momentum firmware
        run: |
          git clone https://github.com/Next-Flip/Momentum-Firmware.git firmware

      - name: Copy application
        run: |
          mkdir -p firmware/applications_user/lf_radar
          cp lf_radar.c firmware/applications_user/lf_radar/
          cp application.fam firmware/applications_user/lf_radar/

      - name: Build FAP
        run: |
          cd firmware
          ./fbt fap_dist APP_DIRS=applications_user/lf_radar

      - name: Debug - list build output
        run: |
          echo "Searching for FAP files..."
          find firmware/build -type f -name "*.fap" || true

      - name: Upload FAP (auto-detect)
        uses: actions/upload-artifact@v4
        with:
          name: lf_radar
          path: firmware/build/**/*.fap
          if-no-files-found: error
